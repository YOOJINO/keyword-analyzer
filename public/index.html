<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바이럴 마케팅 연구소</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1a6dff;--blue-light:#e8f0ff;--blue-mid:#4d8eff;
  --green:#00b96b;--green-light:#e6f9f1;
  --red:#ff4d4f;--red-light:#fff1f0;
  --orange:#fa8c16;--orange-light:#fff7e6;
  --gray-1:#f8f9fc;--gray-2:#f0f2f7;--gray-3:#e2e6ef;
  --gray-4:#bcc4d4;--gray-5:#8a96ab;--gray-6:#5a6478;--gray-7:#2d3547;
  --white:#fff;--radius:10px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-1);color:var(--gray-7);font-size:14px;}

/* 헤더 */
.header{background:var(--white);border-bottom:1px solid var(--gray-3);height:54px;display:flex;align-items:center;padding:0 24px;gap:32px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{font-size:16px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px;}
.logo-box{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
.nav{display:flex;gap:2px;}
.nav-item{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-5);transition:all .15s;}
.nav-item.active{background:var(--blue-light);color:var(--blue);}

/* 사용자 메뉴 */
.user-menu{display:flex;}
.user-id{font-size:12px;font-weight:500;color:var(--gray-6);}
.user-btn{padding:6px 12px;border:1.5px solid var(--gray-3);border-radius:6px;background:var(--white);font-size:12px;font-weight:500;cursor:pointer;color:var(--gray-6);font-family:inherit;transition:all .15s;}
.user-btn:hover{border-color:var(--blue);color:var(--blue);}

/* 모달 */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.2);}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--gray-2);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:16px;font-weight:700;color:var(--gray-7);}
.modal-close{background:none;border:none;font-size:20px;color:var(--gray-5);cursor:pointer;font-family:inherit;}
.modal-body{padding:18px 22px;}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.user-row-wrap{background:var(--gray-1);border-radius:8px;border:1px solid transparent;transition:border-color .15s;}
.user-row-wrap.editing{border-color:var(--blue);}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
.user-row-editor{display:none;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--gray-3);background:var(--white);border-radius:0 0 7px 7px;}
.user-row-editor.open{display:flex;}
.user-row-editor .um-input{flex:1 1 160px;width:auto;}
.um-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.um-btn.primary:hover{background:var(--blue-mid);border-color:var(--blue-mid);}
.um-btn.danger-solid{background:var(--red);color:#fff;border-color:var(--red);}
.um-btn.danger-solid:hover{background:#e63946;border-color:#e63946;}
.editor-msg{font-size:13px;color:var(--gray-7);flex:1;min-width:140px;}
.editor-msg.warn{color:var(--red);font-weight:500;}
.user-row-id{font-weight:600;color:var(--gray-7);font-size:14px;}
.user-row-role{font-size:11px;color:var(--gray-5);background:var(--white);padding:2px 8px;border-radius:10px;border:1px solid var(--gray-3);margin-left:6px;}
.user-row-perm{font-size:10px;color:var(--blue);background:var(--blue-light);padding:2px 7px;border-radius:8px;font-weight:500;}
.user-row-actions{display:flex;gap:6px;}
.um-btn{padding:5px 10px;border:1.5px solid var(--gray-3);border-radius:5px;background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--gray-6);font-family:inherit;}
.um-btn:hover{border-color:var(--blue);color:var(--blue);}
.um-btn.danger:hover{border-color:var(--red);color:var(--red);}
.um-add-form{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding-top:12px;border-top:1px solid var(--gray-2);}
.um-add-form > .um-input.id-field{flex:1 1 140px;min-width:120px;}
.um-add-form > .um-input.pw-field{flex:1 1 140px;min-width:120px;}
.um-add-form > .um-input.role-field{flex:0 0 110px;}
.um-input{border:1.5px solid var(--gray-3);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;box-sizing:border-box;}
.um-input:focus{outline:none;border-color:var(--blue);}
.um-add-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:0 0 auto;white-space:nowrap;}
.um-add-btn:hover{background:var(--blue-mid);}

.main{max-width:1280px;margin:0 auto;padding:24px 20px;}

/* 카드 */
.card{background:var(--white);border:1px solid var(--gray-3);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;}
.card-body{padding:18px 20px;}

/* 경쟁사 분석 — 레이아웃 */
body.view-competitor .main{max-width:none;padding:14px 14px;}
body.view-competitor #viewCategory,
body.view-competitor #viewKeyword{display:none !important;}
.comp-layout{display:flex;gap:14px;align-items:flex-start;}
.comp-sidebar{width:240px;flex-shrink:0;padding:16px 12px;align-self:flex-start;}
.comp-sidebar-title{font-size:13px;font-weight:700;color:var(--gray-6);margin-bottom:10px;padding:0 6px;letter-spacing:.3px;}
.comp-main{flex:1;min-width:0;}

/* 경쟁사 분석 — 사이드바 프로젝트 리스트 */
.comp-proj-item{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--gray-7);font-weight:500;margin-bottom:2px;transition:all .15s;}
.comp-proj-item:hover{background:var(--gray-2);}
.comp-proj-item.active{background:var(--blue-light);color:var(--blue);font-weight:600;}
.comp-proj-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.comp-proj-year{font-size:11px;color:var(--gray-5);font-weight:500;margin-left:auto;}
.comp-proj-item.active .comp-proj-year{color:var(--blue);opacity:.7;}
.comp-proj-actions{display:none;gap:2px;}
.comp-proj-item.active .comp-proj-actions{display:flex;}
.comp-proj-action{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;padding:2px 5px;border-radius:3px;font-family:inherit;line-height:1;opacity:.75;}
.comp-proj-action:hover{opacity:1;background:rgba(0,0,0,.08);}
.comp-proj-name-input{flex:1;width:100%;border:1.5px solid var(--blue);border-radius:4px;padding:3px 6px;font-size:13px;font-weight:500;font-family:inherit;outline:none;color:var(--gray-7);min-width:0;}
.comp-proj-item.renaming .comp-proj-year,
.comp-proj-item.renaming .comp-proj-actions{display:none;}

.comp-add-project-btn{width:100%;margin-top:10px;padding:9px;border:1.5px dashed var(--gray-3);border-radius:6px;background:transparent;font-size:12px;font-weight:500;color:var(--gray-5);cursor:pointer;font-family:inherit;transition:all .15s;}
.comp-add-project-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}

/* 새 프로젝트 폼 */
.comp-create-form{padding:12px;border:1.5px solid var(--blue);border-radius:8px;background:var(--blue-light);margin-top:10px;}
.comp-create-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:10px;}
.comp-create-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.comp-create-row label{font-size:11px;color:var(--gray-6);font-weight:600;min-width:32px;}
.comp-create-input{flex:1;border:1.5px solid var(--gray-3);border-radius:5px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--gray-7);background:#fff;width:100%;box-sizing:border-box;min-width:0;}
.comp-create-input:focus{outline:none;border-color:var(--blue);}
.comp-create-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;}
.comp-create-btn{padding:6px 14px;border:1.5px solid var(--gray-3);border-radius:5px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--gray-7);}
.comp-create-btn:hover{border-color:var(--blue);color:var(--blue);}
.comp-create-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.comp-create-btn.primary:hover{background:var(--blue-mid);}

/* 메인 영역 */
.comp-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.comp-active-title{font-size:16px;font-weight:700;color:var(--gray-7);}
.comp-title-group{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.comp-toolbar-actions{display:flex;align-items:center;gap:10px;}
.comp-last-query{font-size:12px;color:var(--gray-5);font-weight:500;}
.comp-mode-toggle{display:inline-flex;border:1.5px solid var(--gray-3);border-radius:7px;overflow:hidden;}
.comp-mode-btn{background:#fff;border:none;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-7);font-family:inherit;transition:all .15s;}
.comp-mode-btn:not(.active):hover{background:var(--gray-2);color:var(--blue);}
.comp-mode-btn.active{background:var(--blue);color:#fff;}
.comp-mode-btn + .comp-mode-btn{border-left:1.5px solid var(--gray-3);}

/* 즐겨찾기 별표 (카테고리/키워드 조회 결과 테이블) */
.kw-star{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 6px;color:var(--gray-3);transition:color .15s,transform .15s;font-family:inherit;line-height:1;vertical-align:middle;}
.kw-star:hover{color:#fbbf24;transform:scale(1.15);}
.kw-star.on{color:#fbbf24;}

/* 경쟁사 분석 — 즐겨찾기 우측 패널 */
.comp-grid-row{display:flex;gap:14px;align-items:flex-start;}
.comp-grid-card{flex:1;min-width:0;}
.comp-fav-panel{width:220px;flex-shrink:0;padding:14px 12px;align-self:flex-start;max-height:calc(100vh - 140px);overflow-y:auto;}
.comp-fav-panel-title{font-size:13px;font-weight:700;color:var(--gray-6);margin-bottom:10px;padding:0 4px;letter-spacing:.3px;display:flex;align-items:center;gap:4px;}
.comp-fav-empty{font-size:12px;color:var(--gray-5);padding:10px;text-align:center;}
.comp-fav-chip{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:7px 10px;border:1.5px solid var(--gray-3);border-radius:6px;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:var(--gray-7);font-family:inherit;width:100%;margin-bottom:4px;text-align:left;transition:all .15s;}
.comp-fav-chip:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.comp-fav-chip:disabled{background:var(--gray-2);color:var(--gray-5);cursor:default;border-color:var(--gray-3);}
.comp-fav-chip-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.comp-fav-chip-mark{font-size:13px;font-weight:700;}
.comp-edit-btn{padding:7px 16px;border:1.5px solid var(--gray-3);border-radius:7px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--gray-7);transition:all .15s;}
.comp-edit-btn:hover{border-color:var(--blue);color:var(--blue);}
.comp-edit-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.comp-edit-btn:disabled{background:var(--gray-2);color:var(--gray-4);border-color:var(--gray-3);cursor:not-allowed;}
.comp-query-btn{background:var(--blue);color:#fff;border-color:var(--blue);}
.comp-query-btn:hover{background:var(--blue-mid);color:#fff;border-color:var(--blue-mid);}
.comp-query-btn:disabled{background:var(--gray-3);color:#fff;border-color:var(--gray-3);}
.comp-edit-area{display:flex;flex-direction:column;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-2);}
.comp-edit-row{display:flex;gap:8px;align-items:center;}

/* 임계값 색상 설정 */
.comp-thresholds{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:900px){.comp-thresholds{grid-template-columns:1fr;}}
.comp-th-section{padding:12px 14px;background:var(--gray-1);border:1px solid var(--gray-2);border-radius:8px;}
.comp-th-title{font-size:12px;font-weight:700;color:var(--gray-7);margin-bottom:10px;}
.comp-th-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.comp-th-row:last-child{margin-bottom:0;}
.comp-th-row label{font-size:11px;color:var(--gray-6);font-weight:500;min-width:24px;}
.comp-th-input{border:1.5px solid var(--gray-3);border-radius:5px;padding:5px 8px;font-size:12px;font-family:inherit;width:100px;color:var(--gray-7);background:#fff;}
.comp-th-input:focus{outline:none;border-color:var(--blue);}
.comp-th-color{border:1.5px solid var(--gray-3);border-radius:5px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fff;cursor:pointer;flex:1;min-width:90px;color:var(--gray-7);}
.comp-th-color:focus{outline:none;border-color:var(--blue);}

/* 셀 배경 색상 */
.cell-bg-red{background:#fee2e2 !important;}
.cell-bg-orange{background:#ffedd5 !important;}
.cell-bg-yellow{background:#fef9c3 !important;}
.cell-bg-green{background:#dcfce7 !important;}
.cell-bg-blue{background:#dbeafe !important;}
.cell-bg-indigo{background:#e0e7ff !important;}
.cell-bg-purple{background:#f3e8ff !important;}

/* 삭제 확인 */
.comp-confirm{padding:10px 12px;background:var(--red-light);border:1px solid var(--red);border-radius:6px;}
.comp-confirm-msg{font-size:12px;color:var(--red);font-weight:500;display:block;margin-bottom:8px;}
.comp-confirm-actions{display:flex;gap:6px;justify-content:flex-end;}
.comp-confirm-btn{padding:5px 12px;border:1.5px solid var(--gray-3);border-radius:5px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.comp-confirm-btn.danger{background:var(--red);color:#fff;border-color:var(--red);}
.comp-confirm-btn.danger:hover{background:#e63946;border-color:#e63946;}

.comp-add{display:flex;gap:8px;align-items:center;flex:1;max-width:480px;}
.comp-input{flex:1;border:1.5px solid var(--gray-3);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--gray-7);background:var(--white);}
.comp-input:focus{outline:none;border-color:var(--blue);}
.comp-add-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.comp-add-btn:hover{background:var(--blue-mid);}
.comp-grid{border-collapse:collapse;table-layout:auto;}
.comp-grid th,.comp-grid td{border:1px solid var(--gray-2);padding:10px 14px;font-size:13px;text-align:center;white-space:nowrap;}
.comp-grid thead th{background:var(--gray-2);font-weight:600;color:var(--gray-6);position:sticky;top:0;}
.comp-grid thead th:first-child{background:var(--gray-3);color:var(--gray-7);width:100px;min-width:100px;max-width:100px;}
.comp-grid tbody td:first-child{background:var(--gray-1);font-weight:600;color:var(--gray-7);width:100px;min-width:100px;max-width:100px;}
.comp-grid th:not(:first-child),
.comp-grid td:not(:first-child){min-width:120px;}
.comp-grid tbody td{color:var(--gray-7);}
.comp-grid tbody td.empty{color:var(--gray-4);}
.comp-cell-month{font-weight:600;color:var(--gray-7);font-size:13px;}
.comp-cell-cumul{font-size:10px;color:var(--gray-5);margin-top:2px;font-weight:500;}
.comp-grid tbody tr.future td{color:var(--gray-3);background:var(--gray-1);}
.comp-kw-cell{display:flex;align-items:center;justify-content:center;gap:6px;}
.comp-kw-name{font-weight:600;color:var(--gray-7);cursor:pointer;user-select:text;padding:2px 6px;border-radius:4px;transition:background .2s;}
.comp-kw-name:hover{background:var(--gray-2);}
.comp-kw-name.copied{background:var(--green-light);color:var(--green);}
.comp-kw-edit-input{border:1.5px solid var(--blue);border-radius:4px;padding:4px 8px;font-size:13px;font-weight:600;font-family:inherit;outline:none;text-align:center;color:var(--gray-7);min-width:100px;width:100%;background:#fff;}
.comp-grid th.draggable-kw{cursor:move;}
.comp-grid th.dragging{opacity:.4;}
.comp-grid th.drop-target{background:var(--blue-light);box-shadow:inset 3px 0 0 var(--blue);}
.comp-grid td,.comp-grid th{user-select:text;}
.comp-kw-del{background:none;border:none;color:var(--gray-4);cursor:pointer;font-size:14px;padding:0 4px;font-family:inherit;border-radius:50%;line-height:1;}
.comp-kw-del:hover{color:var(--red);background:var(--red-light);}
.comp-empty{text-align:center;padding:60px 20px;color:var(--gray-5);font-size:13px;}

/* 키워드 검색 입력 */
.kw-search-row{display:flex;gap:10px;align-items:center;}
.kw-input{flex:1;border:1.5px solid var(--gray-3);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--gray-7);background:var(--white);}
.kw-input:focus{outline:none;border-color:var(--blue);}

/* 카테고리 바 */
.cat-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cat-wrap{position:relative;}
.cat-select{appearance:none;border:1.5px solid var(--gray-3);border-radius:8px;padding:8px 32px 8px 12px;font-size:13px;font-family:inherit;font-weight:500;color:var(--gray-7);background:var(--white);cursor:pointer;min-width:130px;transition:border .15s;}
.cat-select:focus{outline:none;border-color:var(--blue);}
.cat-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray-4);font-size:10px;pointer-events:none;}
.cat-sep{color:var(--gray-3);font-size:18px;}

/* 필터 */
.filter-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:14px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:13px;font-weight:600;color:var(--gray-6);min-width:72px;}
.period-btns{display:flex;gap:6px;}
.pbtn{padding:6px 14px;border:1.5px solid var(--gray-3);border-radius:6px;background:var(--white);font-size:12px;font-weight:500;cursor:pointer;color:var(--gray-6);font-family:inherit;transition:all .15s;}
.pbtn:hover{border-color:var(--blue);color:var(--blue);}
.pbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}


.radio-group{display:flex;gap:14px;}
.rlabel{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--gray-6);cursor:pointer;}
.rlabel input{accent-color:var(--blue);}

/* 조회 버튼 */
.search-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.search-btn:hover{background:var(--blue-mid);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,109,255,.3);}
.search-btn:disabled{background:var(--gray-4);cursor:not-allowed;transform:none;box-shadow:none;}

/* 검색수 필터 */
.range-wrap{display:flex;align-items:center;gap:8px;}
.range-input{border:1.5px solid var(--gray-3);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;width:90px;text-align:center;}
.range-input:focus{outline:none;border-color:var(--blue);}

/* 에러 */
.error-box{background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;font-size:13px;color:var(--red);display:none;}

/* 결과 헤더 */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.result-title{font-size:15px;font-weight:700;color:var(--gray-7);display:flex;align-items:center;gap:8px;}
.result-period{font-size:13px;font-weight:500;color:var(--gray-6);background:var(--gray-2);padding:3px 10px;border-radius:12px;}
.count-badge{background:var(--blue);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;}
.result-sub{font-size:12px;color:var(--gray-5);}
.action-btn{padding:7px 14px;border:1.5px solid var(--gray-3);border-radius:7px;background:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--gray-6);transition:all .15s;}
.action-btn:hover{border-color:var(--blue);color:var(--blue);}

/* 보기 옵션 */
.view-options{background:#fff;border:1px solid var(--gray-3);border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:var(--shadow);}
.vo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vo-title{font-size:15px;font-weight:700;color:var(--gray-7);}
.vo-reset{font-size:12px;color:var(--gray-5);cursor:pointer;border:none;background:none;font-family:inherit;text-decoration:underline;}
.vo-reset:hover{color:var(--blue);}
.vo-desc{font-size:13px;color:var(--gray-6);margin-bottom:14px;}
.vo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px 16px;padding:14px 18px;border:1px solid var(--gray-3);border-radius:8px;margin-bottom:14px;}
.vo-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-7);cursor:pointer;}
.vo-check input{accent-color:var(--blue);width:16px;height:16px;cursor:pointer;}
.vo-actions{display:flex;gap:10px;}
.vo-btn{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--gray-3);background:var(--gray-1);color:var(--gray-7);}
.vo-btn:hover{border-color:var(--blue);}
.vo-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.vo-btn.primary:hover{background:var(--blue-mid);border-color:var(--blue-mid);}

/* 테이블 */
.table-wrap{background:var(--white);border:1px solid var(--gray-3);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;min-width:800px;}
thead tr{background:var(--gray-2);border-bottom:2px solid var(--gray-3);}
th{padding:11px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--gray-5);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover,th.sorted{color:var(--blue);}
tbody tr{border-bottom:1px solid var(--gray-2);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--gray-1);}
td{padding:11px 14px;font-size:13px;color:var(--gray-7);}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-health{background:var(--green-light);color:var(--green);}
.badge-diet{background:var(--orange-light);color:var(--orange);}
.badge-shopping{background:var(--blue-light);color:var(--blue);}
.badge-info{background:var(--gray-2);color:var(--gray-6);}

/* 검색량 바 */
.bar-cell{display:flex;align-items:center;gap:8px;}
.bar-bg{flex:1;height:6px;background:var(--gray-2);border-radius:3px;overflow:hidden;min-width:50px;}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--blue-mid));}
.bar-val{font-weight:600;min-width:52px;text-align:right;font-size:13px;}
.bar-val.high{color:var(--blue);}

/* 경쟁강도 */
.comp-high{color:var(--red);font-weight:600;}
.comp-mid{color:var(--orange);font-weight:600;}
.comp-low{color:var(--green);font-weight:600;}

/* PC/모바일 비율 */
.ratio-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;width:80px;}
.ratio-pc{background:var(--blue);}
.ratio-mobile{background:var(--orange);}

/* 로딩 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--gray-3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--gray-5);font-weight:500;}

/* 빈 상태 */
.empty-wrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:10px;}
.empty-icon{font-size:44px;opacity:.25;}
.empty-text{font-size:14px;color:var(--gray-5);font-weight:500;}
.empty-sub{font-size:12px;color:var(--gray-4);}

/* 진행바 */
.progress-wrap{display:flex;align-items:center;gap:10px;}
.progress-bg{width:160px;height:6px;background:var(--gray-2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s;}


/* 하단 힌트 */
.hint{font-size:11px;color:var(--gray-4);margin-top:8px;text-align:right;}

/* 범례 */
.legend{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--gray-5);}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* 필터 섹션 */
.filter-section-row{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--gray-2);}
.filter-section-row:last-of-type{border-bottom:none;}
.filter-section-content{display:flex;align-items:center;flex-wrap:wrap;gap:6px;flex:1;}
.filter-toggle-row{display:flex;align-items:center;padding:11px 20px;cursor:pointer;border-bottom:1px solid var(--gray-2);background:var(--gray-1);}
.filter-toggle-row:hover{background:var(--gray-2);}
.filter-label2{font-size:12px;font-weight:600;color:var(--gray-5);white-space:nowrap;}
.filter-divider{width:1px;height:16px;background:var(--gray-3);margin:0 6px;}
.qbtn{padding:4px 10px;border:1.5px solid var(--gray-3);border-radius:5px;background:var(--white);font-size:12px;cursor:pointer;color:var(--gray-6);font-family:inherit;transition:all .15s;white-space:nowrap;}
.qbtn:hover{border-color:var(--blue);color:var(--blue);}
.qbtn.active-q{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.pop-q{position:relative;}
.pop-tag{background:var(--blue);color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;margin-left:3px;vertical-align:middle;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-box">V</div>
    바이럴 마케팅 연구소
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="switchView('Category', this)">카테고리 조회</div>
    <div class="nav-item" onclick="switchView('Keyword', this)">키워드 조회</div>
    <div class="nav-item" onclick="switchView('Competitor', this)">경쟁사 분석</div>
  </div>
  <div class="user-menu" id="userMenu" style="display:none;margin-left:auto;align-items:center;gap:10px;">
    <span class="user-id" id="userIdLabel"></span>
    <button class="user-btn" id="adminBtn" onclick="openUserManager()" style="display:none;">사용자 관리</button>
    <button class="user-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="main">

  <!-- 카테고리 조회 뷰 -->
  <div id="viewCategory">

  <!-- 카테고리 -->
  <div class="card"><div class="card-body">
    <div class="cat-bar">
      <div class="cat-wrap">
        <select class="cat-select" id="cat1">
          <option value="food">식품</option>
        </select>
        <span class="cat-arrow">▼</span>
      </div>
      <span class="cat-sep">›</span>
      <div class="cat-wrap">
        <select class="cat-select" id="cat2" onchange="onCat2Change()">
          <option value="health">건강식품</option>
          <option value="diet">다이어트식품</option>
        </select>
        <span class="cat-arrow">▼</span>
      </div>
      <span id="cat3wrap" style="display:flex;align-items:center;gap:8px;">
        <span class="cat-sep">›</span>
        <div class="cat-wrap">
          <select class="cat-select" id="cat3" onchange="onCat3Change()"></select>
          <span class="cat-arrow">▼</span>
        </div>
      </span>
      <span id="cat4wrap" style="display:flex;align-items:center;gap:8px;">
        <span class="cat-sep">›</span>
        <div class="cat-wrap">
          <select class="cat-select" id="cat4"><option value="">전체</option></select>
          <span class="cat-arrow">▼</span>
        </div>
      </span>
    </div>
  </div></div>

  <!-- 필터 -->
  <div class="card">
    <div class="filter-section-row">
      <span class="filter-label">기간</span>
      <div class="filter-section-content">
        <div class="period-btns">
          <button class="pbtn active" type="button">최근 30일</button>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
          <div id="progressWrap" style="display:none;">
            <div class="progress-wrap">
              <div class="progress-bg"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
              <span style="font-size:11px;color:var(--gray-5);" id="progressText">0%</span>
            </div>
          </div>
          <button class="search-btn" id="searchBtn" onclick="fetchData()">조회</button>
        </div>
      </div>
    </div>
    <div class="filter-toggle-row" onclick="toggleFilter()">
      <span class="filter-label">필터 선택</span>
      <span id="filterToggleIcon" style="color:var(--gray-4);font-size:11px;margin-left:6px;">▶</span>
    </div>
    <div id="filterDetail" style="display:none;">
      <div class="filter-section-row">
        <span class="filter-label">키워드 유형</span>
        <div class="filter-section-content">
          <div class="radio-group">
            <label class="rlabel"><input type="radio" name="kwtype" value="" checked> 전체</label>
            <label class="rlabel"><input type="radio" name="kwtype" value="shopping"> 쇼핑성</label>
            <label class="rlabel"><input type="radio" name="kwtype" value="info"> 정보성</label>
          </div>
          <div class="filter-divider"></div>
          <span class="filter-label2">브랜드 키워드</span>
          <button class="qbtn">주요 브랜드 제외</button>
          <div class="filter-divider"></div>
          <span class="filter-label2">신규 키워드</span>
          <button class="qbtn">1달 전 없던</button>
          <button class="qbtn">1년 전 없던(같은 기간)</button>
        </div>
      </div>
      <div class="filter-section-row">
        <span class="filter-label">성별</span>
        <div class="filter-section-content">
          <div class="radio-group">
            <label class="rlabel"><input type="radio" name="gender" value="" checked> 전체</label>
            <label class="rlabel"><input type="radio" name="gender" value="m"> 남성</label>
            <label class="rlabel"><input type="radio" name="gender" value="f"> 여성</label>
          </div>
        </div>
      </div>
      <div class="filter-section-row">
        <span class="filter-label">검색수</span>
        <div class="filter-section-content">
          <button class="qbtn" onclick="setRange('minSearch','maxSearch',0,5000,this)">0~5,000</button>
          <button class="qbtn pop-q" onclick="setRange('minSearch','maxSearch',500,5000,this)">500~5,000 <span class="pop-tag">인기</span></button>
          <button class="qbtn" onclick="setRange('minSearch','maxSearch',0,10000,this)">0~10,000</button>
          <button class="qbtn" onclick="setRange('minSearch','maxSearch',5000,10000,this)">5,000~10,000</button>
          <div class="range-wrap" style="margin-left:8px;">
            <input class="range-input" id="minSearch" type="number" placeholder="최소 입력" min="0">
            <span style="color:var(--gray-4);margin:0 4px;">-</span>
            <input class="range-input" id="maxSearch" type="number" placeholder="최대 입력" min="0">
          </div>
        </div>
      </div>
      <div class="filter-section-row">
        <span class="filter-label">상품수</span>
        <div class="filter-section-content">
          <button class="qbtn" onclick="setRange('minProduct','maxProduct',0,1000,this)">0~1,000</button>
          <button class="qbtn pop-q" onclick="setRange('minProduct','maxProduct',0,2000,this)">0~2,000 <span class="pop-tag">인기</span></button>
          <button class="qbtn" onclick="setRange('minProduct','maxProduct',0,5000,this)">0~5,000</button>
          <button class="qbtn" onclick="setRange('minProduct','maxProduct',0,10000,this)">0~10,000</button>
          <div class="range-wrap" style="margin-left:8px;">
            <input class="range-input" id="minProduct" type="number" placeholder="최소 입력" min="0">
            <span style="color:var(--gray-4);margin:0 4px;">-</span>
            <input class="range-input" id="maxProduct" type="number" placeholder="최대 입력" min="0">
          </div>
        </div>
      </div>
      <div class="filter-section-row">
        <span class="filter-label">경쟁강도</span>
        <div class="filter-section-content">
          <button class="qbtn pop-q" onclick="setCompFilter('낮음',this)">0~1 <span class="pop-tag">인기</span></button>
          <button class="qbtn" onclick="setCompFilter('중간',this)">0~2</button>
          <button class="qbtn" onclick="setCompFilter('',this)">0~5</button>
          <button class="qbtn" onclick="setCompFilter('',this)">0~10</button>
          <div class="range-wrap" style="margin-left:8px;">
            <input class="range-input" id="minComp" type="number" placeholder="최소 입력" min="0">
            <span style="color:var(--gray-4);margin:0 4px;">-</span>
            <input class="range-input" id="maxComp" type="number" placeholder="최대 입력" min="0">
          </div>
        </div>
      </div>
    </div>
  </div>

  </div><!-- /viewCategory -->

  <!-- 키워드 조회 뷰 -->
  <div id="viewKeyword" style="display:none;">
    <div class="card"><div class="card-body">
      <div class="kw-search-row">
        <input type="text" id="keywordInput" class="kw-input" placeholder="키워드를 입력하세요" onkeydown="if(event.key==='Enter')fetchKeywordData()">
        <button class="search-btn" id="kwSearchBtn" onclick="fetchKeywordData()">조회</button>
      </div>
    </div></div>
  </div>

  <!-- 경쟁사 분석 뷰 -->
  <div id="viewCompetitor" style="display:none;">
    <div class="comp-layout">
      <aside class="card comp-sidebar">
        <div class="comp-sidebar-title">프로젝트</div>
        <div id="compProjectList"></div>
        <button class="comp-add-project-btn" id="compAddProjectBtn" onclick="startAddProject()">+ 새 프로젝트</button>
        <div class="comp-create-form" id="compCreateForm" style="display:none;">
          <div class="comp-create-title">새 프로젝트</div>
          <div class="comp-create-row">
            <label>연도</label>
            <input type="number" class="comp-create-input" id="compNewYear" min="2020" max="2100">
          </div>
          <div class="comp-create-row">
            <label>이름</label>
            <input type="text" class="comp-create-input" id="compNewName" maxlength="40" onkeydown="if(event.key==='Enter')confirmAddProject()">
          </div>
          <div class="comp-create-actions">
            <button class="comp-create-btn" onclick="cancelAddProject()">취소</button>
            <button class="comp-create-btn primary" onclick="confirmAddProject()">만들기</button>
          </div>
        </div>
        <div class="comp-confirm" id="compConfirm" style="display:none;margin-top:10px;"></div>
      </aside>
      <div class="comp-main">
        <div class="card"><div class="card-body" style="padding:14px 18px;">
          <div class="comp-toolbar">
            <div class="comp-title-group">
              <span class="comp-active-title" id="compActiveTitle"></span>
              <div class="comp-mode-toggle">
                <button class="comp-mode-btn active" id="modeMonth" onclick="setCompMode('month')">최근 한달</button>
                <button class="comp-mode-btn" id="modeDaily" onclick="setCompMode('daily')">일일 누적</button>
              </div>
            </div>
            <div class="comp-toolbar-actions">
              <span class="comp-last-query" id="compLastQuery"></span>
              <button class="comp-edit-btn comp-query-btn" id="compQueryBtn" onclick="queryCompetitor()">조회하기</button>
              <button class="comp-edit-btn" id="compEditBtn" onclick="toggleEditMode()">편집</button>
            </div>
          </div>
          <div class="comp-edit-area" id="compEditArea" style="display:none;">
            <div class="comp-edit-row">
              <input type="text" class="comp-input" id="compNewKw" placeholder="키워드 입력 후 Enter" onkeydown="if(event.key==='Enter')addCompKeyword()">
              <button class="comp-add-btn" onclick="addCompKeyword()">+ 키워드 추가</button>
            </div>
            <div class="comp-thresholds" id="compThresholds"></div>
          </div>
        </div></div>
        <div class="comp-grid-row">
          <div class="card comp-grid-card"><div class="card-body" style="padding:0;overflow:auto;">
            <div id="compGridArea">
              <div style="text-align:center;padding:60px 20px;color:var(--gray-5);font-size:13px;">로딩 중...</div>
            </div>
          </div></div>
          <aside class="card comp-fav-panel" id="compFavPanel" style="display:none;">
            <div class="comp-fav-panel-title">⭐ 즐겨찾기</div>
            <div id="compFavList"></div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="resultArea">
    <div class="empty-wrap">
      <div class="empty-icon">📊</div>
      <div class="empty-text">카테고리를 선택하고 조회 버튼을 눌러주세요</div>
      <div class="empty-sub">건강식품 · 다이어트식품 카테고리 키워드 검색량을 확인할 수 있습니다</div>
    </div>
  </div>

</div>

<!-- 사용자 관리 모달 -->
<div class="modal-bg" id="userModal" onclick="if(event.target===this)closeUserManager()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">사용자 관리</span>
      <button class="modal-close" onclick="closeUserManager()">×</button>
    </div>
    <div class="modal-body">
      <div class="user-list" id="userList"></div>
      <form class="um-add-form" onsubmit="addUser(event)">
        <input type="text" class="um-input id-field" id="newUserId" placeholder="새 ID" required>
        <input type="password" class="um-input pw-field" id="newUserPw" placeholder="비밀번호 (4자+)" required>
        <select class="um-input role-field" id="newUserRole" onchange="onRoleChange()">
          <option value="user">일반 사용자</option>
          <option value="admin">관리자</option>
        </select>
        <button type="submit" class="um-add-btn">추가</button>
        <div class="um-perms" id="newUserPerms" style="flex-basis:100%;display:flex;gap:14px;align-items:center;padding:8px 0 0 0;flex-wrap:wrap;">
          <span style="font-size:12px;font-weight:600;color:var(--gray-6);">권한:</span>
          <label class="vo-check"><input type="checkbox" data-newperm="category" checked> 카테고리 조회</label>
          <label class="vo-check"><input type="checkbox" data-newperm="keyword" checked> 키워드 조회</label>
          <label class="vo-check"><input type="checkbox" data-newperm="competitor" checked> 경쟁사 분석</label>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
// =============================================
// 카테고리 데이터
// =============================================
const CAT_DATA = {
  health: {
    label: '건강식품',
    sub: {
      '비타민제': {
        seeds: ['멀티비타민','비타민A','비타민B','비타민C','비타민D','비타민E','비오틴','비타민K'],
        cat4: ['멀티비타민','비타민A','비타민B','비타민C','비타민D','비타민E','비오틴','비타민K','기타비타민']
      },
      '한방재료': {
        seeds: ['가시오가피','감초','계피','구기자','녹용','산수유','오미자','헛개나무','황기'],
        cat4: ['가시오가피','감초','계피','구기자','녹용','산수유','오미자','헛개나무','황기','기타한방재료']

function getSeeds() {

  if (cat4 && cat4 !== '') return [cat4];
  if (cat3 && cat3 !== '') {

    return subData?.seeds || [cat3];
  }

  const c2label = cat2 === 'health' ? '건강식품' : '다이어트식품';
  if (cat4 && cat4 !== '') return `${c2label} > ${cat3} > ${cat4}`;
  if (cat3 && cat3 !== '') return `${c2label} > ${cat3}`;
  return c2label;
}

function getKwCategory(keyword) {
  const healthKeys = Object.values(CAT_DATA.health.sub).flatMap(s => s.seeds);
  const dietKeys = Object.values(CAT_DATA.diet.sub).flatMap(s => s.seeds);
  if (healthKeys.some(k => keyword.includes(k) || k.includes(keyword))) return '건강식품';
  if (dietKeys.some(k => keyword.includes(k) || k.includes(keyword))) return '다이어트식품';
  const cat2 = document.getElementById('cat2').value;
  return cat2 === 'diet' ? '다이어트식품' : '건강식품';
}

function applyThresholdChange() {
  const proj = activeProject();
  if (!proj) return;
  const get = sel => document.querySelector(`[data-th="${sel}"]`);
  const num = sel => {
    const v = get(sel).value;
    const n = parseFloat(v);
    return v === '' || isNaN(n) ? null : n;
  };
  const str = sel => get(sel).value || '';
  proj.thresholds = {
    month: {
      below: { value: num('month-below-value'), color: str('month-below-color') },
      between: { from: num('month-between-from'), to: num('month-between-to'), color: str('month-between-color') },
      above: { value: num('month-above-value'), color: str('month-above-color') },
    },
    daily: {
      below: { value: num('daily-below-value'), color: str('daily-below-color') },
      between: { from: num('daily-between-from'), to: num('daily-between-to'), color: str('daily-between-color') },
      above: { value: num('daily-above-value'), color: str('daily-above-color') },
    },
  };
  renderCompetitorGrid();
  saveCompetitor();
}

function getCellColorClass(value) {
  if (value == null || isNaN(value)) return '';
  const proj = activeProject();
  const thresholds = proj && proj.thresholds && proj.thresholds[_compMode];
  if (!thresholds) return '';
  // 우선순위: between > below > above
  const b = thresholds.between;
  if (b && b.color && b.from != null && b.to != null && value >= b.from && value <= b.to) {
    return ' cell-bg-' + b.color;
  }
  const lo = thresholds.below;
  if (lo && lo.color && lo.value != null && value <= lo.value) {
    return ' cell-bg-' + lo.color;
  }
  const hi = thresholds.above;
  if (hi && hi.color && hi.value != null && value >= hi.value) {
    return ' cell-bg-' + hi.color;
  }
  return '';
}

function calcDailyCumul(monthKey, monthlyValue) {
  if (typeof monthlyValue !== 'number') return null;
  const today = new Date();
  const curY = today.getFullYear();
  const curM = today.getMonth() + 1;
  const [y, m] = monthKey.split('-').map(Number);
  if (y > curY || (y === curY && m > curM)) return null;
  if (y === curY && m === curM) {
    const days = today.getDate();
    return Math.round(monthlyValue / 30 * days);
  }
  return monthlyValue;
}

async function loadCompetitorData() {
  const area = document.getElementById('compGridArea');
  area.innerHTML = '<div class="comp-empty">로딩 중...</div>';
  try {
    const resp = await fetch('/api/competitor');
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || '로드 실패');
    }
    _compState = await resp.json();
    setEditMode(false);
    cancelAddProject();
    renderProjectList();
    renderCompetitorGrid();
  } catch (err) {
    area.innerHTML = `<div class="comp-empty" style="color:var(--red);">${err.message}</div>`;
  }
}

    : '최근 조회: -';
}

function onKwDblClick(e, el, kw) {
  e.stopPropagation();
  if (_compEditMode) {
    startKeywordEdit(el, kw);
  } else {
    copyKeywordToClipboard(el, kw);
  }
}

function startKeywordEdit(el, oldKw) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'comp-kw-edit-input';
  input.value = oldKw;
  input.maxLength = 60;
  let saved = false;
  const cleanup = () => { saved = true; renderCompetitorGrid(); };
  const save = () => {
    if (saved) return;
    saved = true;
    const newKw = input.value.trim();
    commitKeywordRename(oldKw, newKw);
  };
  input.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    else if (e.key === 'Escape') { cleanup(); }
  });
  input.addEventListener('blur', save);
  el.replaceWith(input);
  input.focus();
  input.select();
}

async function commitKeywordRename(oldKw, newKw) {
  const proj = activeProject();
  if (!proj) return renderCompetitorGrid();
  if (!newKw || newKw === oldKw) return renderCompetitorGrid();
  if (proj.keywords.includes(newKw)) {
    alert('이미 존재하는 키워드입니다.');
    return renderCompetitorGrid();
  }
  const idx = proj.keywords.indexOf(oldKw);
  if (idx < 0) return renderCompetitorGrid();
  proj.keywords[idx] = newKw;
  // 키워드 이름이 바뀌면 = 다른 키워드 = 기존 데이터 무효 → 모든 월에서 해당 컬럼 데이터 삭제
  for (const monthKey of Object.keys(proj.data)) {
    if (proj.data[monthKey] && oldKw in proj.data[monthKey]) {
      delete proj.data[monthKey][oldKw];
    }
  }
  renderCompetitorGrid();
  await saveCompetitor();
}

// =============================================
// 키워드 컬럼 드래그 정렬 (편집 모드)
// =============================================
let _dragKw = null;

function onKwDragStart(e, kw) {
  if (!_compEditMode) return;
  _dragKw = kw;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', kw);
  e.currentTarget.classList.add('dragging');
}

function onKwDragEnd() {
  document.querySelectorAll('.comp-grid th').forEach(th => {
    th.classList.remove('dragging');
    th.classList.remove('drop-target');
  });
  _dragKw = null;
}

function onKwDragOver(e, kw) {
  if (!_compEditMode || !_dragKw || _dragKw === kw) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}

function onKwDragLeave(e) {
  e.currentTarget.classList.remove('drop-target');
}

async function onKwDrop(e, targetKw) {
  if (!_compEditMode || !_dragKw) return;
  e.preventDefault();
  const proj = activeProject();
  if (!proj || _dragKw === targetKw) { onKwDragEnd(); return; }
  const fromIdx = proj.keywords.indexOf(_dragKw);
  const toIdx = proj.keywords.indexOf(targetKw);
  if (fromIdx < 0 || toIdx < 0) { onKwDragEnd(); return; }
  const [moved] = proj.keywords.splice(fromIdx, 1);
  proj.keywords.splice(toIdx, 0, moved);
  onKwDragEnd();
  renderCompetitorGrid();
  await saveCompetitor();
}

function copyKeywordToClipboard(el, kw) {
  const text = String(kw).replace(/\\(['\\])/g, '$1');
  const onSuccess = () => {
    el.classList.add('copied');
    const orig = el.textContent;
    el.textContent = '복사됨';
    setTimeout(() => {
      el.classList.remove('copied');
      el.textContent = orig;
    }, 800);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); onSuccess(); } catch {}
  document.body.removeChild(ta);
}

function formatCompDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function queryCompetitor() {
  const proj = activeProject();
  if (!proj) return;
  if (!proj.keywords.length) { alert('등록된 키워드가 없습니다. 편집 버튼에서 키워드를 추가해주세요.'); return; }
  const now = new Date();
  const curY = now.getFullYear();
  if (proj.year !== curY) {
    alert(`프로젝트 연도(${proj.year})와 현재 연도(${curY})가 달라 조회할 수 없습니다.\n조회는 프로젝트와 같은 연도에서만 가능합니다.`);
    return;
  }
  const ym = `${curY}-${String(now.getMonth() + 1).padStart(2, '0')}`;

  const btn = document.getElementById('compQueryBtn');
  btn.disabled = true;
  btn.textContent = '조회 중...';

  try {
    const norm = s => (s || '').replace(/\s+/g, '').toLowerCase();
    const targetMap = new Map(proj.keywords.map(kw => [norm(kw), kw]));
    const found = {};
    const chunkSize = 5;

    for (let i = 0; i < proj.keywords.length; i += chunkSize) {
      const chunk = proj.keywords.slice(i, i + chunkSize);
      const resp = await fetch('/api/keywords', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hintKeywords: chunk }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || '조회 실패');
      for (const k of (data.keywords || [])) {
        const orig = targetMap.get(norm(k.keyword));
        if (orig && !(orig in found)) found[orig] = k.totalSearch;
      }
      await new Promise(r => setTimeout(r, 200));
    }

    if (!proj.data[ym]) proj.data[ym] = {};
    for (const kw of proj.keywords) {
      proj.data[ym][kw] = (kw in found) ? found[kw] : null;
    }
    proj.lastQueryDate = now.toISOString();
    renderProjectList();
    renderCompetitorGrid();
    await saveCompetitor();
  } catch (err) {
    alert('조회 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '조회하기';
  }
}

async function commitRename(projectId, newName) {

function renderCompetitorGrid() {
  const area = document.getElementById('compGridArea');
  const proj = activeProject();
  if (!proj) return area.innerHTML = '';
  const { keywords, data, year } = proj;
  const today = new Date();
  const curY = today.getFullYear();
  const curM = today.getMonth() + 1;

  const months = [];
  for (let m = 1; m <= 12; m++) {
    months.push({
      key: `${year}-${String(m).padStart(2, '0')}`,
      label: `${year}-${String(m).padStart(2, '0')}`,
      future: (year > curY) || (year === curY && m > curM),
    });
  }

  if (!keywords.length) {
    area.innerHTML = `
      <div class="comp-empty">
        등록된 키워드가 없습니다.<br>
        우측 상단 <strong>편집</strong> 버튼을 눌러 키워드를 추가해주세요.
      </div>`;
    return;
  }

  const headerCols = keywords.map(kw => {
    const dragAttrs = _compEditMode
      ? `class="draggable-kw" draggable="true" ondragstart="onKwDragStart(event,'${escapeAttr(kw)}')" ondragend="onKwDragEnd()" ondragover="onKwDragOver(event,'${escapeAttr(kw)}')" ondragleave="onKwDragLeave(event)" ondrop="onKwDrop(event,'${escapeAttr(kw)}')"`
      : '';
    const tip = _compEditMode ? '더블클릭하여 수정 / 드래그로 순서 변경' : '더블클릭하여 복사';
    return `
    <th ${dragAttrs}>
      <div class="comp-kw-cell">
        <span class="comp-kw-name" ondblclick="onKwDblClick(event, this, '${escapeAttr(kw)}')" title="${tip}">${escapeHtml(kw)}</span>
        ${_compEditMode ? `<button class="comp-kw-del" onclick="removeCompKeyword('${escapeAttr(kw)}')" title="삭제">×</button>` : ''}
      </div>
    </th>`;
  }).join('');

  const rows = months.map(m => {
    const cells = keywords.map(kw => {
      const v = data[m.key]?.[kw];
      if (v === null || v === undefined) return `<td class="empty">-</td>`;
      const display = _compMode === 'daily' ? calcDailyCumul(m.key, v) : v;
      if (display === null || display === undefined) return `<td class="empty">-</td>`;
      const colorCls = getCellColorClass(display);
      return `<td class="${colorCls.trim()}">${Number(display).toLocaleString()}</td>`;
    }).join('');
    return `<tr class="${m.future ? 'future' : ''}"><td>${m.label}</td>${cells}</tr>`;
  }).join('');

  area.innerHTML = `
    <table class="comp-grid">
      <thead>
        <tr>
          <th>날짜</th>
          ${headerCols}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function removeCompKeyword(kw) {

async function saveCompetitor() {
  if (!_compState) return;
  try {
    const resp = await fetch('/api/competitor', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projects: _compState.projects, activeProjectId: _compState.activeProjectId }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || '저장 실패');
    }
    _compState = await resp.json();
  } catch (err) {
    alert('저장 실패: ' + err.message);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return String(s).replace(/['\\]/g, '\\$&');
}

async function fetchKeywordData() {
  const keyword = document.getElementById('keywordInput').value.trim();
  if (!keyword) return showError('키워드를 입력해주세요.');

  hideError();
  const btn = document.getElementById('kwSearchBtn');
  btn.disabled = true; btn.textContent = '조회 중...';
  showLoading();

  try {
    const resp = await fetch('/api/keywords', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hintKeywords: [keyword] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const norm = s => (s || '').replace(/\s+/g, '').toLowerCase();
    const target = norm(keyword);
    const exact = (data.keywords || []).filter(k => norm(k.keyword) === target);
    lastResults = exact;
    renderTable(lastResults);
  } catch(e) {
    showError(e.message);
    document.getElementById('resultArea').innerHTML = '';
  }

  btn.disabled = false; btn.textContent = '조회';
}

async function fetchData() {
  const seeds = getSeeds();
  if (!seeds.length) return showError('카테고리를 선택해주세요.');

  hideError();
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '조회 중...';
  document.getElementById('progressWrap').style.display = 'block';
  showLoading();

  try {
    const allResults = new Map();
    const chunkSize = 5;
    const chunks = [];
    for (let i = 0; i < seeds.length; i += chunkSize) chunks.push(seeds.slice(i, i + chunkSize));

    for (let i = 0; i < chunks.length; i++) {
      setProgress(Math.round(((i + 1) / chunks.length) * 100), i * chunkSize, seeds.length);

      const resp = await fetch('/api/keywords', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hintKeywords: chunks[i] })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      (data.keywords || []).forEach(k => {
        if (!allResults.has(k.keyword)) allResults.set(k.keyword, k);
      });
      await sleep(200);
    }

    setProgress(100, seeds.length, seeds.length);

    let results = Array.from(allResults.values());

    // 검색수 필터
    const minV = parseInt(document.getElementById('minSearch').value) || 0;
    const maxV = parseInt(document.getElementById('maxSearch').value) || Infinity;
    if (minV > 0 || maxV < Infinity) {
      results = results.filter(r => r.totalSearch >= minV && r.totalSearch <= maxV);
    }

    results.sort((a, b) => b.totalSearch - a.totalSearch);
    lastResults = results.slice(0, 500);

    setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 800);
    renderTable(lastResults);
  } catch(e) {
    showError(e.message);
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('progressWrap').style.display = 'none';
  }

  btn.disabled = false; btn.innerHTML = '🔍 조회';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setProgress(pct, done, total) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${Math.min(done, total)}/${total}`;
}

function showLoading() {
  document.getElementById('resultArea').innerHTML = `
    <div class="table-wrap"><div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">네이버 검색광고 API에서 키워드를 수집 중...</div>
    </div></div>`;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

function compBadge(comp) {
  if (comp === '높음') return '<span class="comp-high">높음</span>';
  if (comp === '중간') return '<span class="comp-mid">중간</span>';
  return '<span class="comp-low">낮음</span>';
}

function medal(r) { return r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : ''; }

function fmtNum(n) {
  return (n || 0).toLocaleString();
}

function sortData(data, col, asc) {
  return [...data].sort((a, b) => {
    const va = a[col], vb = b[col];
    if (typeof va === 'string') return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return asc ? va - vb : vb - va;
  });
}

function si(col) {
  if (sortCol !== col) return '<span style="color:var(--gray-3);margin-left:3px;font-size:10px;">⇅</span>';
  return `<span style="margin-left:3px;font-size:10px;">${sortAsc ? '↑' : '↓'}</span>`;
}

function doSort(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
  if (lastResults.length) renderTable(lastResults);
}

function renderTable(results) {
  if (!results.length) {
    document.getElementById('resultArea').innerHTML = `
      <div class="empty-wrap"><div class="empty-icon">🔍</div>
      <div class="empty-text">조회 결과가 없습니다</div></div>`;
    return;
  }

  const sorted = sortData(results, sortCol, sortAsc);
  const maxSearch = Math.max(...sorted.map(r => r.totalSearch), 1);
  const catLabel = getCatLabel();
  const v = visibleColumns;

  const rows = sorted.map((r, i) => {
    const rank = i + 1;
    const barW = Math.round((r.totalSearch / maxSearch) * 100);
    const kwCat = getKwCategory(r.keyword);
    const catBadge = kwCat === '건강식품'
      ? `<span class="badge badge-health">건강식품</span>`
      : `<span class="badge badge-diet">다이어트식품</span>`;
    const isHigh = r.totalSearch > 10000;
    const avgClk = (r.monthlyAvePcClkCnt || 0) + (r.monthlyAveMobileClkCnt || 0);

    const isFav = _favorites.has(r.keyword);
    return `<tr>
      <td><span style="color:var(--gray-5);font-weight:600;margin-right:4px;">${rank}</span>${medal(rank)}</td>
      <td>
        <button class="kw-star${isFav ? ' on' : ''}" onclick="toggleFavorite('${escapeAttr ? escapeAttr(r.keyword) : r.keyword.replace(/'/g, "\\'")}', this)" title="즐겨찾기">${isFav ? '★' : '☆'}</button>
        <strong>${r.keyword}</strong>
      </td>
      ${v.has('category') ? `<td>${catBadge}</td>` : ''}
      ${v.has('classification') ? `<td><span class="badge badge-shopping">쇼핑성</span></td>` : ''}
      ${v.has('totalSearch') ? `<td>
        <div class="bar-cell">
          <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
          <span class="bar-val ${isHigh ? 'high' : ''}">${fmtNum(r.totalSearch)}</span>
        </div>
      </td>` : ''}
      ${v.has('pcSearch') ? `<td style="font-size:12px;color:var(--gray-5);">${fmtNum(r.monthlyPcQcCnt)}</td>` : ''}
      ${v.has('mobileSearch') ? `<td style="font-size:12px;color:var(--gray-5);">${fmtNum(r.monthlyMobileQcCnt)}</td>` : ''}
      ${v.has('pcRatio') ? `<td style="font-size:12px;color:var(--gray-6);">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="ratio-bar">
            <div class="ratio-pc" style="width:${r.pcRatio}%"></div>
            <div class="ratio-mobile" style="width:${100 - r.pcRatio}%"></div>
          </div>
          <span>PC ${r.pcRatio}%</span>
        </div>
      </td>` : ''}
      ${v.has('compIdx') ? `<td>${compBadge(r.compIdx)}</td>` : ''}
      ${v.has('avgClk') ? `<td style="font-size:12px;color:var(--gray-5);">${fmtNum(avgClk)}</td>` : ''}
    </tr>`;
  }).join('');

  const checkboxesHtml = COLUMN_CONFIG.filter(c => !c.fixed).map(c => `
    <label class="vo-check">
      <input type="checkbox" id="vo_${c.key}" ${visibleColumns.has(c.key) ? 'checked' : ''}>
      ${c.label}
    </label>
  `).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result-header">
      <div class="result-title">
        ${catLabel}
        <span class="count-badge">${results.length}개</span>
        <span class="result-period">최근 30일</span>
        <span class="result-sub">월간 검색량 기준</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="action-btn" onclick="toggleViewOptions()">⊞ 보기옵션</button>
      </div>
    </div>
    <div class="view-options" id="viewOptions" style="display:${viewOptionsOpen ? 'block' : 'none'};">
      <div class="vo-header">
        <span class="vo-title">보기 옵션</span>
        <button class="vo-reset" onclick="resetViewOptions()">초기화</button>
      </div>
      <p class="vo-desc">보기 항목이나 표기 방법을 원하는 형태로 선택해보세요.</p>
      <div class="vo-grid">${checkboxesHtml}</div>
      <div class="vo-actions">
        <button class="vo-btn" onclick="cancelViewOptions()">취소</button>
        <button class="vo-btn primary" onclick="saveViewOptions()">저장</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="doSort('rank')" class="${sortCol==='rank'?'sorted':''}">순위${si('rank')}</th>
          <th onclick="doSort('keyword')" class="${sortCol==='keyword'?'sorted':''}">키워드${si('keyword')}</th>
          ${v.has('category') ? `<th>대표 카테고리</th>` : ''}
          ${v.has('classification') ? `<th>분류</th>` : ''}
          ${v.has('totalSearch') ? `<th onclick="doSort('totalSearch')" class="${sortCol==='totalSearch'?'sorted':''}">검색수${si('totalSearch')}</th>` : ''}
          ${v.has('pcSearch') ? `<th onclick="doSort('monthlyPcQcCnt')" class="${sortCol==='monthlyPcQcCnt'?'sorted':''}">PC 검색수${si('monthlyPcQcCnt')}</th>` : ''}
          ${v.has('mobileSearch') ? `<th onclick="doSort('monthlyMobileQcCnt')" class="${sortCol==='monthlyMobileQcCnt'?'sorted':''}">모바일 검색수${si('monthlyMobileQcCnt')}</th>` : ''}
          ${v.has('pcRatio') ? `<th>PC/모바일 비율</th>` : ''}
          ${v.has('compIdx') ? `<th onclick="doSort('compIdx')" class="${sortCol==='compIdx'?'sorted':''}">경쟁강도${si('compIdx')}</th>` : ''}
          ${v.has('avgClk') ? `<th>평균 광고클릭수</th>` : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="hint">💡 검색수 = PC + 모바일 합산 | 네이버 검색광고 API 기준 | 최대 500개</p>`;
}

function toggleViewOptions() {
  viewOptionsOpen = !viewOptionsOpen;
  const panel = document.getElementById('viewOptions');
  if (panel) panel.style.display = viewOptionsOpen ? 'block' : 'none';
}

function saveViewOptions() {
  const next = new Set(['rank', 'keyword']);
  COLUMN_CONFIG.forEach(c => {
    if (c.fixed) return;
    const cb = document.getElementById('vo_' + c.key);
    if (cb && cb.checked) next.add(c.key);
  });
  visibleColumns = next;
  viewOptionsOpen = false;
  if (lastResults.length) renderTable(lastResults);
}

function cancelViewOptions() {
  COLUMN_CONFIG.forEach(c => {
    if (c.fixed) return;
    const cb = document.getElementById('vo_' + c.key);
    if (cb) cb.checked = visibleColumns.has(c.key);
  });
  viewOptionsOpen = false;
  document.getElementById('viewOptions').style.display = 'none';
}

function resetViewOptions() {
  COLUMN_CONFIG.forEach(c => {
    if (c.fixed) return;
    const cb = document.getElementById('vo_' + c.key);
    if (cb) cb.checked = !!c.default;
  });
}


// =============================================
// 인증 / 사용자 관리
// =============================================
let currentUser = null;

const PERM_TO_VIEW = { category: 'Category', keyword: 'Keyword', competitor: 'Competitor' };
const PERM_LABEL = { category: '카테고리 조회', keyword: '키워드 조회', competitor: '경쟁사 분석' };

let _favorites = new Set();

async function loadFavoritesData() {
  try {
    const resp = await fetch('/api/favorites');
    if (!resp.ok) return;
    const data = await resp.json();
    _favorites = new Set(data.favorites || []);
  } catch {}
}

async function toggleFavorite(kw, btn) {
  const isFav = _favorites.has(kw);
  const oldClass = btn.className;
  const oldText = btn.textContent;
  btn.disabled = true;
  try {
    const resp = await fetch('/api/favorites', {
      method: isFav ? 'DELETE' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword: kw }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '실패');
    _favorites = new Set(data.favorites || []);
    if (_favorites.has(kw)) {
      btn.classList.add('on');
      btn.textContent = '★';
    } else {
      btn.classList.remove('on');
      btn.textContent = '☆';
    }
  } catch (err) {
    btn.className = oldClass;
    btn.textContent = oldText;
    alert(err.message);
  } finally {
    btn.disabled = false;
  }
}

function renderFavoritesPanel() {
  const list = document.getElementById('compFavList');
  if (!list) return;
  const proj = activeProject();
  const projKw = new Set(proj?.keywords || []);
  const favs = [..._favorites];
  if (!favs.length) {
    list.innerHTML = '<div class="comp-fav-empty">즐겨찾기한 키워드가 없습니다.<br><br>카테고리 조회 / 키워드 조회에서 ★ 버튼을 눌러 추가하세요.</div>';
    return;
  }
  list.innerHTML = favs.map(kw => {
    const added = projKw.has(kw);
    return `<button class="comp-fav-chip" onclick="addFavToProject('${escapeAttr(kw)}')" ${added ? 'disabled' : ''}>
      <span class="comp-fav-chip-name">${escapeHtml(kw)}</span>
      <span class="comp-fav-chip-mark">${added ? '✓' : '+'}</span>
    </button>`;
  }).join('');
}

async function addFavToProject(kw) {
  const proj = activeProject();
  if (!proj) return;
  if (proj.keywords.includes(kw)) return;
  proj.keywords.push(kw);
  renderCompetitorGrid();
  renderFavoritesPanel();
  await saveCompetitor();
}

async function checkAuth() {
  try {
    const resp = await fetch('/api/me');
    if (!resp.ok) {
      location.href = '/login.html';
      return false;
    }
    const data = await resp.json();
    currentUser = data.user;
    document.getElementById('userMenu').style.display = 'flex';
    document.getElementById('userIdLabel').textContent = currentUser.id;
    if (currentUser.role === 'admin') {
      document.getElementById('adminBtn').style.display = 'inline-block';
    }
    applyNavPermissions();
    return true;
  } catch {
    location.href = '/login.html';
    return false;
  }
}

function applyNavPermissions() {
  const navItems = document.querySelectorAll('.nav .nav-item');
  const perms = currentUser.permissions || [];
  const order = ['category', 'keyword', 'competitor'];
  let firstVisibleIdx = -1;
  navItems.forEach((el, i) => {
    const has = currentUser.role === 'admin' || perms.includes(order[i]);
    el.style.display = has ? '' : 'none';
    if (has && firstVisibleIdx < 0) firstVisibleIdx = i;
  });
  // 현재 active가 숨겨졌으면 첫 보이는 메뉴로 전환
  const activeEl = document.querySelector('.nav .nav-item.active');
  if (activeEl && activeEl.style.display === 'none' && firstVisibleIdx >= 0) {
    navItems[firstVisibleIdx].click();
  }
}

function onRoleChange() {
  const role = document.getElementById('newUserRole').value;
  document.getElementById('newUserPerms').style.display = role === 'user' ? 'flex' : 'none';
}

async function doLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  try {
    await fetch('/api/logout', { method: 'POST' });
  } catch {}
  location.href = '/login.html';
}

async function openUserManager() {
  document.getElementById('userModal').classList.add('open');
  await refreshUserList();
}

function closeUserManager() {
  document.getElementById('userModal').classList.remove('open');
}

let _userListCache = [];

async function refreshUserList() {
  const list = document.getElementById('userList');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-5);font-size:13px;">로딩 중...</div>';
  try {
    const resp = await fetch('/api/users');
    if (!resp.ok) throw new Error((await resp.json()).error || '사용자 목록 로드 실패');
    const data = await resp.json();
    _userListCache = data.users;
    if (!data.users.length) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-5);font-size:13px;">등록된 사용자가 없습니다.</div>';
      return;
    }
    list.innerHTML = data.users.map((u, i) => {
      const perms = u.role === 'admin' ? ['category', 'keyword', 'competitor'] : (u.permissions || []);
      const permsLabel = u.role === 'admin'
        ? '<span style="font-size:11px;color:var(--gray-5);">전체</span>'
        : (perms.length
            ? perms.map(p => `<span class="user-row-perm">${PERM_LABEL[p] || p}</span>`).join('')
            : '<span style="font-size:11px;color:var(--gray-4);">권한 없음</span>');
      return `
      <div class="user-row-wrap" id="urw-${i}">
        <div class="user-row">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div>
              <span class="user-row-id">${u.id}</span>
              <span class="user-row-role">${u.role === 'admin' ? '관리자' : '일반'}</span>
            </div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">${permsLabel}</div>
          </div>
          <div class="user-row-actions">
            <button class="um-btn" onclick="openEditor(${i}, 'password')">비번변경</button>
            ${u.role !== 'admin' ? `<button class="um-btn" onclick="openEditor(${i}, 'perms')">권한</button>` : ''}
            ${u.id !== currentUser.id ? `<button class="um-btn danger" onclick="openEditor(${i}, 'delete')">삭제</button>` : ''}
          </div>
        </div>
        <div class="user-row-editor" id="ure-${i}"></div>
      </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = `<div style="color:var(--red);padding:12px;font-size:13px;">${e.message}</div>`;
  }
}

function closeAllEditors() {
  document.querySelectorAll('.user-row-editor').forEach(el => {
    el.classList.remove('open');
    el.innerHTML = '';
  });
  document.querySelectorAll('.user-row-wrap').forEach(el => el.classList.remove('editing'));
}

function openEditor(idx, mode) {
  closeAllEditors();
  const u = _userListCache[idx];
  if (!u) return;
  const editor = document.getElementById(`ure-${idx}`);
  const wrap = document.getElementById(`urw-${idx}`);
  if (mode === 'password') {
    editor.innerHTML = `
      <input type="password" class="um-input" id="pw-${idx}" placeholder="새 비밀번호 (4자+)" autocomplete="new-password">
      <button class="um-btn" onclick="closeAllEditors()">취소</button>
      <button class="um-btn primary" onclick="savePassword(${idx})">저장</button>
    `;
  } else if (mode === 'perms') {
    const perms = u.permissions || [];
    editor.innerHTML = `
      <label class="vo-check"><input type="checkbox" data-editperm="category" ${perms.includes('category') ? 'checked' : ''}> 카테고리 조회</label>
      <label class="vo-check"><input type="checkbox" data-editperm="keyword" ${perms.includes('keyword') ? 'checked' : ''}> 키워드 조회</label>
      <label class="vo-check"><input type="checkbox" data-editperm="competitor" ${perms.includes('competitor') ? 'checked' : ''}> 경쟁사 분석</label>
      <button class="um-btn" onclick="closeAllEditors()">취소</button>
      <button class="um-btn primary" onclick="savePermissionsAt(${idx})">저장</button>
    `;
  } else if (mode === 'delete') {
    editor.innerHTML = `
      <span class="editor-msg warn">"${u.id}" 사용자를 삭제하시겠습니까?</span>
      <button class="um-btn" onclick="closeAllEditors()">취소</button>
      <button class="um-btn danger-solid" onclick="doDelete(${idx})">삭제</button>
    `;
  }
  editor.classList.add('open');
  wrap.classList.add('editing');
  const firstInput = editor.querySelector('input');
  if (firstInput) firstInput.focus();
}

async function savePassword(idx) {
  const u = _userListCache[idx];
  if (!u) return;
  const pw = document.getElementById(`pw-${idx}`).value;
  if (pw.length < 4) return alert('비밀번호는 4자 이상이어야 합니다.');
  try {
    const resp = await fetch('/api/users', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: u.id, password: pw }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '변경 실패');
    closeAllEditors();
    await refreshUserList();
  } catch (err) {
    alert(err.message);
  }
}

async function savePermissionsAt(idx) {
  const u = _userListCache[idx];
  if (!u) return;
  const permissions = Array.from(document.querySelectorAll(`#ure-${idx} [data-editperm]:checked`)).map(cb => cb.dataset.editperm);
  try {
    const resp = await fetch('/api/users', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: u.id, permissions }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '변경 실패');
    closeAllEditors();
    await refreshUserList();
  } catch (err) {
    alert(err.message);
  }
}

async function doDelete(idx) {
  const u = _userListCache[idx];
  if (!u) return;
  try {
    const resp = await fetch('/api/users', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: u.id }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '삭제 실패');
    closeAllEditors();
    await refreshUserList();
  } catch (err) {
    alert(err.message);
  }
}

async function addUser(e) {
  e.preventDefault();
  const id = document.getElementById('newUserId').value.trim();
  const password = document.getElementById('newUserPw').value;
  const role = document.getElementById('newUserRole').value;
  const permissions = Array.from(document.querySelectorAll('[data-newperm]:checked')).map(cb => cb.dataset.newperm);
  try {
    const resp = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, password, role, permissions }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '추가 실패');
    document.getElementById('newUserId').value = '';
    document.getElementById('newUserPw').value = '';
    document.querySelectorAll('[data-newperm]').forEach(cb => cb.checked = true);
    await refreshUserList();
  } catch (err) {
    alert(err.message);
  }
}


// 초기화 — 인증 통과 시에만 카테고리 init
checkAuth().then(async ok => {
  if (!ok) return;
  await loadFavoritesData();
  onCat2Change();
});
</script>
